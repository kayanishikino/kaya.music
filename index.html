<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kaya's Exclusive Music Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="player-wrapper">
    <img src="images/disc.png" id="disc" class="disc-bg">

    <div class="player">
      <img id="cover" class="cover">
      <div class="info">
        <h2 id="title">Song Title</h2>
        <p id="artist">Artist</p>
        <div class="timeline">
          <span id="current">0:00</span>
          <input type="range" id="progress" value="0">
          <span id="duration">0:00</span>
        </div>

        <div class="controls">
          <button id="shuffle"><i class="fa-solid fa-shuffle"></i></button>
          <button id="prev"><i class="fa-solid fa-backward"></i></button>
          <button id="playPause"><i class="fa-solid fa-play"></i></button>
          <button id="next"><i class="fa-solid fa-forward"></i></button>
          <button id="loop"><i class="fa-solid fa-repeat"></i></button>
        </div>

        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
      </div>

      <!-- SONG LIST -->
      <div class="song-list">
        <ul id="songList"></ul>
      </div>

    </div>
  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
</body>
</html>
